<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Refugio | El mapa de tu vida para darte paz</title>
    <meta name="description" content="Decodificamos tu mapa de vida a través de cálculos astronómicos exactos para darte paz y claridad mental.">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Inter:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,600&display=swap" rel="stylesheet">

    <style>
        :root {
            --dark-purple: #14001A;
            --orchid-glow: #8B1C62;
            --jewel-fuchsia: #D4208C;
            --jewel-purple: #5E1494;
            --text-cream: #FDFBF7;
            --text-pearl: rgba(255, 255, 255, 0.88);
            --text-muted: #D1C5D8;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        @keyframes pulseGlow {
            0% { background-position: 50% 50%; }
            50% { background-position: 50% 40%; }
            100% { background-position: 50% 50%; }
        }

        body {
            font-family: 'Inter', sans-serif;
            color: var(--text-muted);
            background-color: var(--dark-purple);
            background-image: radial-gradient(circle at 50% 30%, var(--orchid-glow) 0%, var(--dark-purple) 70%, #0A000D 100%);
            background-size: 150% 150%;
            background-attachment: fixed;
            animation: pulseGlow 15s ease-in-out infinite;
            line-height: 1.7;
            overflow-x: hidden;
        }

        h1, h2, h3, h4, .serif {
            font-family: 'Playfair Display', serif;
            color: var(--text-pearl);
            font-weight: 600;
        }

        h1, h2 { text-shadow: 0 0 20px rgba(255, 255, 255, 0.3); }
        a { text-decoration: none; color: inherit; }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }

        p { line-height: 1.7; }

        .glass {
            background: rgba(20, 0, 26, 0.45);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-top: 1px solid rgba(255, 255, 255, 0.25);
            border-radius: 20px;
            box-shadow: inset 0 0 30px rgba(0, 0, 0, 0.6), 0 20px 40px rgba(0, 0, 0, 0.8);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .glass:hover {
            transform: translateY(-8px);
            box-shadow: inset 0 0 35px rgba(0, 0, 0, 0.5), 0 25px 50px rgba(20, 0, 26, 0.9);
            border: 1px solid rgba(255, 255, 255, 0.25);
        }

        .btn {
            display: inline-block;
            padding: 16px 36px;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.2);
            font-size: 1.05rem;
            font-family: 'Inter', sans-serif;
            transition: all 0.4s;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--jewel-fuchsia) 0%, var(--jewel-purple) 100%);
            color: var(--text-cream);
            box-shadow: 0 0 20px rgba(200, 40, 150, 0.5), inset 0 0 10px rgba(255, 255, 255, 0.2);
            text-shadow: 0 1px 3px rgba(0, 0, 0, 0.5);
        }

        .btn-primary:hover {
            transform: scale(1.06) translateY(-4px);
            box-shadow: 0 0 30px rgba(200, 40, 150, 0.7), inset 0 0 15px rgba(255, 255, 255, 0.4);
            filter: brightness(1.2);
        }

        .btn-dominante {
            font-size: 1.2rem;
            padding: 24px 60px;
            border-radius: 50px;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 600;
        }

        /* HEADER */
        header { padding: 30px 0; position: absolute; top: 0; left: 0; right: 0; z-index: 100; }
        .header-content { display: flex; justify-content: space-between; align-items: center; }
        .logo-container { display: flex; flex-direction: column; align-items: center; gap: 5px; transition: transform 0.4s ease; }
        .logo-container:hover { transform: translateY(-2px); }
        .logo-text { font-family: 'Great Vibes', cursive; font-size: 2.2rem; color: var(--text-cream); text-shadow: 0px 4px 6px rgba(0, 0, 0, 0.8), 0px 0px 15px rgba(255, 255, 255, 0.2); line-height: 1; }
        .nav-links { display: flex; gap: 40px; }
        .nav-links a { font-family: 'Inter', sans-serif; font-size: 13px; font-weight: 300; text-transform: uppercase; letter-spacing: 1.8px; color: rgba(255, 255, 255, 0.6); padding-bottom: 4px; border-bottom: 1px solid transparent; transition: all 0.4s ease; }
        .nav-links a:hover { color: var(--text-cream); text-shadow: 0 0 10px rgba(253, 251, 247, 0.5); border-bottom: 1px solid rgba(253, 251, 247, 0.4); }
        .header-cta { background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.3); color: var(--text-cream); padding: 10px 24px; border-radius: 30px; font-size: 13px; text-transform: uppercase; letter-spacing: 1px; transition: all 0.4s ease; }
        .header-cta:hover { background: rgba(255, 255, 255, 0.2); border-color: rgba(255, 255, 255, 0.6); color: #FFF; }

        /* HERO */
        .hero { position: relative; padding: 180px 0 120px; text-align: center; }
        .hero h1 { font-size: 4.8rem; max-width: 1100px; margin: 0 auto 30px; line-height: 1.1; letter-spacing: 1.5px; }
        .hero h1 em { font-style: italic; font-weight: 400; color: var(--text-cream); }
        .hero p { font-size: 1.25rem; max-width: 700px; margin: 0 auto 60px; color: var(--text-muted); font-weight: 300; text-shadow: 0 2px 8px rgba(0, 0, 0, 0.8); }

        /* =========================================
           FORMULARIO DE CRISTAL (3 FILAS LIMPIO)
           ========================================= */
        .formulario-refugio { display: flex; justify-content: center; width: 100%; max-width: 980px; margin: 0 auto; }
        
        .caja-cristal {
            display: flex; flex-wrap: wrap !important; background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.15); box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(10px); width: 100%; border-radius: 25px !important;
            padding: 22px !important; gap: 15px !important; 
        }
        
        /* FILA 1: Nombre y Correo */
        #reg-nombre { flex: 1 1 35% !important; min-width: 200px !important; }
        #reg-email { flex: 2 1 55% !important; min-width: 250px !important; }
        
        /* FILA 2: Fecha, Hora y Buscador */
        #reg-fecha, #reg-hora { flex: 1 1 20% !important; min-width: 120px !important; }
        .lugar-list-container { flex: 3 1 45% !important; min-width: 220px !important; position: relative;}
        
        /* FILA 3: Botón centrado abajo */
        #btn-registro { flex: 1 1 100% !important; max-width: 280px !important; margin: 15px auto 5px auto !important; }

        .input-lujo {
            background: rgba(255, 255, 255, 0.08) !important; border: 1px solid rgba(255, 255, 255, 0.4) !important; 
            color: #FDFBF7 !important; padding: 12px 15px; font-size: 0.9rem !important;
            font-family: 'Inter', sans-serif; outline: none; border-radius: 30px !important;
            transition: all 0.3s ease; box-sizing: border-box;
        }
        
        .input-lujo:-webkit-autofill, .input-lujo:-webkit-autofill:hover, .input-lujo:-webkit-autofill:focus, .input-lujo:-webkit-autofill:active{
            -webkit-box-shadow: 0 0 0 30px #2a0a3a inset !important; -webkit-text-fill-color: #FDFBF7 !important; border-radius: 30px !important;
        }
        
        .input-lujo::placeholder { color: rgba(253, 251, 247, 0.7) !important; }
        .input-lujo:focus { background: rgba(255, 255, 255, 0.15) !important; border: 1px solid rgba(212, 32, 140, 1) !important; box-shadow: 0 0 12px rgba(212, 32, 140, 0.6) !important; }
        .input-lujo::-webkit-calendar-picker-indicator { filter: invert(1); cursor: pointer; opacity: 0.7; }

        .btn-magia {
            background: linear-gradient(135deg, var(--jewel-fuchsia) 0%, var(--jewel-purple) 100%); color: white;
            border: none; padding: 16px 25px; border-radius: 40px; font-weight: 600; font-family: 'Inter', sans-serif;
            cursor: pointer; font-size: 1.05rem; box-shadow: 0 0 15px rgba(212, 32, 140, 0.3); transition: transform 0.2s, box-shadow 0.2s; white-space: nowrap;
        }
        .btn-magia:hover { transform: scale(1.02); box-shadow: 0 0 25px rgba(212, 32, 140, 0.6); }

        /* BUSCADOR KOMOOT */
        #lugar-list {
            position: absolute; top: 100%; left: 0; width: 100%; background: rgba(20, 0, 26, 0.95);
            border: 1px solid rgba(255, 255, 255, 0.2); border-radius: 8px; z-index: 100; max-height: 200px; overflow-y: auto; margin-top: 5px;
        }
        .hidden { display: none !important; }
        .autocomplete-item { padding: 10px; cursor: pointer; font-size: 0.85rem; color: #FDFBF7; border-bottom: 1px solid rgba(255, 255, 255, 0.05); }
        .autocomplete-item:hover { background: rgba(255, 255, 255, 0.1); }

        /* SECCIONES: Filosofía y Como Funciona */
        .philosophy { padding: 100px 0; }
        .philosophy-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 70px; align-items: center; }
        .philosophy-text h2 { font-size: 3.2rem; margin-bottom: 24px; line-height: 1.2; letter-spacing: 0.5px; }
        .philosophy-text p { font-size: 1.15rem; margin-bottom: 24px; color: var(--text-muted); font-weight: 300; }
        .philosophy-card { padding: 60px 40px; text-align: center; }
        .philosophy-card blockquote { font-size: 1.8rem; color: var(--text-pearl); font-style: italic; line-height: 1.5; letter-spacing: 0.5px; text-shadow: 0 0 10px rgba(255, 255, 255, 0.2); }

        .how-it-works { padding: 100px 0; text-align: center; }
        .how-it-works h2 { font-size: 3.2rem; margin-bottom: 70px; letter-spacing: 0.5px; }
        .steps-container { display: flex; gap: 35px; justify-content: center; flex-wrap: wrap; }
        .step-card { flex: 1; min-width: 300px; padding: 60px 40px; text-align: left; }
        .step-icon { font-size: 2.2rem; margin-bottom: 28px; background: linear-gradient(135deg, var(--jewel-fuchsia) 0%, var(--dark-purple) 100%); border: 1px solid rgba(255, 255, 255, 0.2); width: 80px; height: 80px; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: var(--text-cream); box-shadow: 0 0 20px rgba(139, 28, 98, 0.4), inset 0 0 15px rgba(0, 0, 0, 0.8); transition: transform 0.4s ease; }
